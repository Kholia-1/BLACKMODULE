<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>BLACKMODULE - Modifier mot de passe</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 0;
        }

        .header {
            background: #111827;
            color: white;
            padding: 20px 40px;
        }

        .header h1 {
            margin: 0;
            font-size: 26px;
        }

        .header p {
            margin: 5px 0 0;
            color: #d1d5db;
        }

        .nav {
            margin-top: 15px;
        }

        .nav a {
            color: #93c5fd;
            margin-right: 18px;
            text-decoration: none;
            font-weight: bold;
        }

        .container {
            padding: 30px 40px;
            max-width: 650px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 26px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.06);
        }

        h2 {
            margin-top: 0;
            color: #111827;
        }

        label {
            display: block;
            margin-top: 14px;
            margin-bottom: 6px;
            color: #374151;
            font-size: 14px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 11px 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
        }

        button {
            margin-top: 20px;
            padding: 12px 18px;
            background: #111827;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .message-success {
            background: #dcfce7;
            color: #166534;
            padding: 14px;
            border-radius: 10px;
            margin-bottom: 18px;
            font-weight: bold;
        }

        .message-error {
            background: #fee2e2;
            color: #991b1b;
            padding: 14px;
            border-radius: 10px;
            margin-bottom: 18px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="header">
    <h1>BLACKMODULE</h1>
    <p>Tableau de bord général</p>

    {% include "partials/navbar.html" %}
</div>

<div class="container">

    {% if message %}
        {% if success %}
            <div class="message-success">{{ message }}</div>
        {% else %}
            <div class="message-error">{{ message }}</div>
        {% endif %}
    {% endif %}

    <div class="card">
        <h2>Changer mon mot de passe</h2>

        <form method="post" action="/web/change-password">
            <label>Ancien mot de passe</label>
            <input type="password" name="old_password" required>

            <label>Nouveau mot de passe</label>
            <input type="password" name="new_password" required>

            <label>Confirmer le nouveau mot de passe</label>
            <input type="password" name="confirm_password" required>

            <button type="submit">Modifier le mot de passe</button>
        </form>
    </div>

</div>

</body>
</html>
